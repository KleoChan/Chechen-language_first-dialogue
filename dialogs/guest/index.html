<script>
    (function() {
        var DIALOG_ID = 'guest';
        var isCompleted = false;

        function sendComplete() {
            if (isCompleted) return;
            isCompleted = true;
            if (window.parent) {
                window.parent.postMessage({
                    type: 'dialogComplete',
                    dialogId: DIALOG_ID
                }, '*');
            }
        }

        function sendReset() {
            if (window.parent) {
                window.parent.postMessage({
                    type: 'dialogReset',
                    dialogId: DIALOG_ID
                }, '*');
            }
        }

        function findButtons() {
            var buttons = document.querySelectorAll('button, a, .btn, [role="button"]');
            for (var i = 0; i < buttons.length; i++) {
                var text = buttons[i].textContent || '';
                
                if (text.indexOf('Завершить') !== -1 || 
                    text.indexOf('Готово') !== -1 || 
                    text.indexOf('Finish') !== -1 || 
                    text.indexOf('Complete') !== -1) {
                    if (!buttons[i]._handledFinish) {
                        buttons[i]._handledFinish = true;
                        var originalClick = buttons[i].onclick;
                        buttons[i].onclick = function(e) {
                            sendComplete();
                            if (originalClick) {
                                originalClick.call(this, e);
                            }
                        };
                    }
                }
                
                if (text.indexOf('Начать сначала') !== -1 || 
                    text.indexOf('Restart') !== -1 || 
                    text.indexOf('Start over') !== -1) {
                    if (!buttons[i]._handledReset) {
                        buttons[i]._handledReset = true;
                        var originalClickReset = buttons[i].onclick;
                        buttons[i].onclick = function(e) {
                            sendReset();
                            if (originalClickReset) {
                                originalClickReset.call(this, e);
                            }
                        };
                    }
                }
            }
        }

        var checkInterval = setInterval(function() {
            findButtons();
            var completeElements = document.querySelectorAll(
                '.complete-screen, .finish-screen, .result-screen, ' +
                '[class*="complete"], [class*="finish"], [class*="result"]'
            );
            for (var i = 0; i < completeElements.length; i++) {
                if (completeElements[i].offsetParent !== null) {
                    sendComplete();
                    break;
                }
            }
        }, 1000);

        setTimeout(function() {
            clearInterval(checkInterval);
        }, 60000);

        window.addEventListener('message', function(event) {
            var data = event.data;
            if (data && data.type === 'finish') {
                sendComplete();
            }
            if (data && data.type === 'restart') {
                sendReset();
            }
        });
    })();
</script>
